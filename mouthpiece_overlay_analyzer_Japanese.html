<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>マウスピース形状解析ツール</title>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; background: #f5f5f7; color: #333; box-sizing: border-box; }
        h3 { margin: 0 0 10px 0; font-size: 16px; font-weight: 600; color: #1d1d1f; border-bottom: 2px solid #e5e5ea; padding-bottom: 5px; }
        .container { display: flex; flex: 1; overflow: hidden; gap: 10px; }
        .panel { width: 300px; background: white; padding: 15px; border-radius: 12px; border: 1px solid #d2d2d7; display: flex; flex-direction: column; }
        .viewer { flex: 1; background: white; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #d2d2d7; cursor: grab; }
        .zoom-canvas { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transform-origin: center center; }
        .file-list { flex: 1; overflow-y: auto; border: 1px solid #e5e5ea; margin: 5px 0; padding: 5px; border-radius: 6px; background: #fafafa; }
        .file-item { padding: 10px 8px; cursor: pointer; border-bottom: 1px solid #f2f2f7; font-size: 13px; }
        .file-item.selected { background: #0071e3; color: white; }
        .overlay-img { position: absolute; max-width: 90%; max-height: 90%; mix-blend-mode: multiply; pointer-events: none; object-fit: contain; }
    </style>
</head>
<body>

<h3>マウスピース形状解析ツール</h3>
<div class="container">
    <div class="panel">
        <span class="section-label">比較するモデルを選択:</span>
        <div class="file-list" id="fileList">読み込み中...</div>
        <div class="controls">
            <span class="section-label">2枚目の透過度調整:</span>
            <input type="range" id="alphaSlider" min="0" max="1" step="0.01" value="0.5" style="width:100%">
        </div>
    </div>
    <div class="viewer" id="viewer">
        <div class="zoom-canvas" id="zoomCanvas"></div>
    </div>
</div>

<script>
    // 【重要】ここにリポジトリ内の画像ファイル名を記載してください
    const imageFiles = [
        "01_BACH_3_S.png",
        "02_BACH_4C_S.png",
        "03_BACH_5GS_S.png",
        "04_BACH_6_S.png"
        // 必要に応じてリストを追加
    ];

    const fileList = document.getElementById('fileList');
    const zoomCanvas = document.getElementById('zoomCanvas');
    const alphaSlider = document.getElementById('alphaSlider');
    
    let loadedImages = {};
    let selectedIndices = [];
    let scale = 1, translateX = 0, translateY = 0;

    // 初期化：ページ読み込み時に自動で画像をロード
    window.addEventListener('DOMContentLoaded', () => {
        fileList.innerHTML = '';
        imageFiles.forEach((name, index) => {
            loadedImages[name] = name; // パスをそのまま使用
            
            const item = document.createElement('div');
            item.className = 'file-item';
            item.textContent = name;
            item.addEventListener('click', () => toggleSelect(index));
            fileList.appendChild(item);
        });
    });

    function toggleSelect(index) {
        const items = fileList.getElementsByClassName('file-item');
        const name = imageFiles[index];

        if (selectedIndices.includes(index)) {
            selectedIndices = selectedIndices.filter(i => i !== index);
            items[index].classList.remove('selected');
        } else {
            selectedIndices.push(index);
            items[index].classList.add('selected');
        }
        renderOverlay();
    }

    function renderOverlay() {
        zoomCanvas.innerHTML = '';
        selectedIndices.forEach((imgIndex, i) => {
            const name = imageFiles[imgIndex];
            const img = document.createElement('img');
            img.src = name; // リポジトリ内の相対パスを参照
            img.className = 'overlay-img';
            img.style.opacity = (i === 0) ? 1 : alphaSlider.value;
            img.style.zIndex = (i === 0) ? 1 : 2;
            zoomCanvas.appendChild(img);
        });
        updateTransform();
    }

    // 以下の機能（ズーム・ドラッグ等）は元のコードを維持
    function updateTransform() {
        zoomCanvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
    }
    
    alphaSlider.addEventListener('input', renderOverlay);
    // ... (以降のイベントリスナー等は元のコードから流用してください)
</script>
</body>
</html>
