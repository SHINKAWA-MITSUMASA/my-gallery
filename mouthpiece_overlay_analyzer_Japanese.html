<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>マウスピース形状解析ツール</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; background: #f5f5f7; color: #333; box-sizing: border-box; }
        h3 { margin: 0 0 10px 0; font-size: 16px; font-weight: 600; color: #1d1d1f; border-bottom: 2px solid #e5e5ea; padding-bottom: 5px; }
        .container { display: flex; flex: 1; overflow: hidden; gap: 10px; }
        .panel { width: 300px; background: white; padding: 15px; border-radius: 12px; border: 1px solid #d2d2d7; display: flex; flex-direction: column; flex-shrink: 0; }
        .viewer { flex: 1; background: white; border-radius: 12px; position: relative; overflow: hidden; border: 1px solid #d2d2d7; cursor: grab; user-select: none; }
        .viewer:active { cursor: grabbing; }
        .zoom-canvas { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; transform-origin: center center; }
        .file-list { flex: 1; overflow-y: auto; border: 1px solid #e5e5ea; margin: 5px 0; padding: 5px; border-radius: 6px; background: #fafafa; -webkit-overflow-scrolling: touch; }
        .file-item { padding: 10px 8px; cursor: pointer; border-bottom: 1px solid #f2f2f7; font-size: 13px; }
        .file-item.selected { background: #0071e3; color: white; font-weight: 500; }
        .overlay-img { position: absolute; max-width: 90%; max-height: 90%; mix-blend-mode: multiply; pointer-events: none; object-fit: contain; }
        .controls { margin-top: 10px; padding-top: 10px; border-top: 1px solid #e5e5ea; flex-shrink: 0; }
        
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .panel { width: 100%; height: 40%; }
        }
    </style>
</head>
<body>

<h3>マウスピース形状解析ツール</h3>
<div class="container">
    <div class="panel">
        <span class="section-label">比較するモデルを選択:</span>
        <div class="file-list" id="fileList">読み込み中...</div>
        <div class="controls">
            <span class="section-label">2枚目の透過度調整:</span>
            <input type="range" id="alphaSlider" min="0" max="1" step="0.01" value="0.5" style="width:100%">
        </div>
    </div>
    <div class="viewer" id="viewer">
        <div class="zoom-canvas" id="zoomCanvas"></div>
    </div>
</div>

<script>
    // 【ここに82個分のファイル名をすべて記述してください】
    const imageFiles = [
        "01_BACH_3_S.png", "02_BACH_4C_S.png", "03_BACH_5GS_S.png", "04_BACH_6_S.png",
        // ... 残りのファイル名もここにすべて追記してください
    ];

    const fileList = document.getElementById('fileList');
    const zoomCanvas = document.getElementById('zoomCanvas');
    const alphaSlider = document.getElementById('alphaSlider');
    const viewer = document.getElementById('viewer');
    
    let selectedIndices = [];
    let scale = 1, translateX = 0, translateY = 0;
    let isDragging = false, startX = 0, startY = 0;

    window.addEventListener('DOMContentLoaded', () => {
        fileList.innerHTML = '';
        imageFiles.forEach((name, index) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.textContent = name;
            item.addEventListener('click', () => {
                if (selectedIndices.includes(index)) {
                    selectedIndices = selectedIndices.filter(i => i !== index);
                    item.classList.remove('selected');
                } else {
                    selectedIndices.push(index);
                    item.classList.add('selected');
                }
                renderOverlay();
            });
            fileList.appendChild(item);
        });
    });

    function renderOverlay() {
        zoomCanvas.innerHTML = '';
        selectedIndices.forEach((idx, i) => {
            const img = document.createElement('img');
            img.src = imageFiles[idx]; 
            img.className = 'overlay-img';
            img.style.opacity = (i === 0) ? 1 : alphaSlider.value;
            img.style.zIndex = (i === 0) ? 1 : 2;
            zoomCanvas.appendChild(img);
        });
        updateTransform();
    }

    function updateTransform() { zoomCanvas.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`; }

    // 操作ロジック：マウス ＆ タッチ統合版
    const startDrag = (x, y) => {
        if (selectedIndices.length === 0) return;
        isDragging = true; startX = x - translateX; startY = y - translateY;
    };
    
    // マウス操作
    viewer.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        translateX = e.clientX - startX; translateY = e.clientY - startY; updateTransform();
    });
    window.addEventListener('mouseup', () => isDragging = false);

    // タッチ操作
    viewer.addEventListener('touchstart', (e) => {
        if(e.touches.length === 1) startDrag(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    window.addEventListener('touchmove', (e) => {
        if (!isDragging) return;
        translateX = e.touches[0].clientX - startX; translateY = e.touches[0].clientY - startY; updateTransform();
    }, { passive: true });
    window.addEventListener('touchend', () => isDragging = false);

    // ホイールズーム
    viewer.addEventListener('wheel', (e) => {
        e.preventDefault();
        scale *= (e.deltaY < 0) ? 1.1 : 1 / 1.1;
        scale = Math.min(Math.max(0.5, scale), 15);
        updateTransform();
    }, { passive: false });

    alphaSlider.addEventListener('input', renderOverlay);
</script>
</body>
</html>
